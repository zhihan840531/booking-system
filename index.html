<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試上 / 課程登記系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{
    --pink:#F8D3E0; --pink-deep:#F2A7C3; --yellow:#FBE79C; --mint:#CDEBE0; --mint-deep:#9FD9C4;
    --lav:#E0D6F0; --peach:#FBD9C4; --blue:#9BC4D6; --blue-deep:#6FA9C0;
    --ink:#4a4a4a; --ink-soft:#8a8a8a; --bg:#FFFDFA; --card:#FFFFFF; --line:#E6E2DB; --muted:#bdb8b0; --holiday:#CFE6F5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC','Gaegu',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding-bottom:60px;}
  header{padding:16px 16px 2px;text-align:center;}
  .brand{font-family:'Gaegu',sans-serif;font-size:14px;color:var(--ink-soft);letter-spacing:2px;}
  .cloud{font-size:11px;color:var(--mint-deep);margin-top:2px;}

  .tabs{display:flex;justify-content:center;gap:10px;padding:8px 12px 4px;flex-wrap:wrap;}
  .tab{font-family:'Gaegu',sans-serif;font-weight:700;font-size:19px;border:none;cursor:pointer;border-radius:14px;padding:9px 24px;color:var(--ink);background:#F0EDE7;transition:.12s;}
  .tab:hover{transform:translateY(-1px);}
  .tab.active{transform:translateY(-1px);box-shadow:0 4px 0 rgba(0,0,0,.06);}
  .tab[data-page="es"].active{background:var(--pink);}
  .tab[data-page="others"].active{background:var(--mint);}
  .tab[data-page="home"].active{background:var(--peach);}
  .home{max-width:620px;margin:0 auto;padding:0 16px;}
  .home h2{font-family:'Gaegu',sans-serif;font-size:20px;margin:20px 0 8px;display:flex;align-items:center;gap:8px;}
  .home h2 .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
  .home .dh{font-family:'Gaegu',sans-serif;font-weight:700;font-size:14px;color:var(--ink-soft);margin:9px 0 4px;}
  .home .ln{background:#fff;border-radius:10px;padding:8px 12px;margin-bottom:5px;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .home .ln b{font-weight:700;}
  .home .none{color:var(--ink-soft);font-family:'Gaegu',sans-serif;font-size:15px;padding:4px 2px 6px;}

  .util{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;padding:4px 16px 6px;}
  .util button{background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:13px;font-family:'Noto Sans TC',sans-serif;}
  .util button:hover{color:var(--blue-deep);text-decoration:underline;}

  .viewtoggle{display:flex;justify-content:center;padding:4px 16px 8px;}
  .viewtoggle button{font-family:'Gaegu',sans-serif;font-weight:700;font-size:15px;border:none;cursor:pointer;background:#F0EDE7;color:var(--ink);padding:8px 24px;}
  .viewtoggle button:first-child{border-radius:12px 0 0 12px;}
  .viewtoggle button:last-child{border-radius:0 12px 12px 0;}
  .viewtoggle button.active{background:var(--mint-deep);color:#fff;}

  .monthbar{display:flex;align-items:center;justify-content:center;gap:14px;padding:2px 16px;}
  .monthbar h1{font-family:'Gaegu',sans-serif;font-weight:700;font-size:24px;text-align:center;}
  .navbtn{border:none;background:#F0EDE7;cursor:pointer;border-radius:50%;width:36px;height:36px;font-size:18px;color:var(--ink);display:flex;align-items:center;justify-content:center;}
  .navbtn:hover{background:var(--blue);color:#fff;}

  .ctrls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:8px 16px 12px;}
  .btn{font-family:'Gaegu',sans-serif;font-weight:700;font-size:14px;border:none;cursor:pointer;border-radius:12px;padding:9px 16px;color:var(--ink);background:#F0EDE7;transition:.12s;}
  .btn:hover{filter:brightness(.96);}
  .btn.primary{background:var(--blue);color:#fff;}
  .btn.pink{background:var(--pink-deep);color:#fff;}
  .btn:disabled{opacity:.5;cursor:default;}

  .page{display:none;} .page.show{display:block;}

  .cal{max-width:1000px;margin:0 auto;padding:0 12px;}
  .notice{text-align:center;color:var(--ink-soft);font-family:'Gaegu',sans-serif;font-size:16px;background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .dow{text-align:center;font-family:'Gaegu',sans-serif;font-weight:700;color:var(--ink-soft);padding:2px 0 4px;font-size:14px;}
  .day{background:#fff;border-radius:12px;min-height:62px;padding:4px 4px 5px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .day.blank{background:transparent;box-shadow:none;}
  .day.has{cursor:pointer;transition:outline .1s;}
  .day.has:hover{outline:2px solid var(--blue);}
  .dnum{font-family:'Gaegu',sans-serif;font-weight:700;font-size:13px;color:var(--ink-soft);width:21px;height:21px;display:inline-flex;align-items:center;justify-content:center;}
  .day.has .dnum{color:var(--ink);}
  .day.today .dnum{background:var(--pink-deep);color:#fff;border-radius:50%;}
  .badge{display:block;font-size:10.5px;border-radius:6px;padding:1px 4px;margin-top:3px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .badge.c0{background:var(--pink);} .badge.c1{background:var(--yellow);} .badge.c2{background:var(--mint);}
  .badge.c3{background:var(--lav);} .badge.c4{background:var(--peach);} .badge.c5{background:#D7E7C8;}
  .badge.full{background:var(--blue-deep);color:#fff;}
  .badge.more{background:#EFEBE4;color:var(--ink-soft);text-align:center;}
  .badge.slotempty{background:#F1EEE8;color:var(--muted);}
  .day.holiday{background:var(--holiday)!important;}
  .day.holiday .dnum{color:var(--blue-deep);}
  .hol-label{display:block;font-size:11px;color:var(--blue-deep);font-family:'Gaegu',sans-serif;font-weight:700;margin-top:4px;}
  body.holmode .day.has{outline:2px dashed var(--blue);}
  .holbanner{display:none;max-width:1000px;margin:0 auto 8px;padding:8px 14px;background:var(--holiday);color:var(--blue-deep);
    border-radius:12px;text-align:center;font-family:'Gaegu',sans-serif;font-size:15px;font-weight:700;}
  body.holmode .holbanner{display:block;}
  #holidayBtn.on{color:var(--blue-deep);font-weight:700;}

  .slot{border:2px dashed var(--blue);border-radius:12px;padding:9px 10px;margin-bottom:9px;cursor:pointer;min-height:70px;transition:.12s;}
  .slot:hover{background:#F6FBFD;border-color:var(--blue-deep);}
  .slot.empty{display:flex;align-items:center;justify-content:center;color:var(--blue-deep);font-family:'Gaegu',sans-serif;font-size:15px;}
  .slot .nm{font-weight:700;font-size:15px;} .slot .nm .en{font-weight:400;color:var(--ink-soft);font-size:13px;}
  .slot .meta{font-size:12px;color:var(--ink-soft);margin-top:3px;} .slot .meta b{color:var(--ink);font-weight:500;}
  .slot-h{font-family:'Gaegu',sans-serif;font-weight:700;font-size:16px;margin:10px 2px 7px;}
  .slot-h:first-child{margin-top:0;}

  .erow{border:2px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:9px;cursor:pointer;}
  .erow:hover{border-color:var(--blue);}
  .erow .nm{font-weight:700;font-size:15px;} .erow .nm .en{font-weight:400;color:var(--ink-soft);font-size:13px;}
  .erow .tags{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:12px;border-radius:7px;padding:2px 9px;font-weight:500;}
  .tag.course{background:var(--peach);} .tag.source{background:var(--lav);}
  .erow .sub{font-size:12px;color:var(--ink-soft);margin-top:4px;} .erow .sub b{color:var(--ink);font-weight:500;}

  .others-top{max-width:760px;margin:0 auto;padding:0 16px;}
  .search{width:100%;border:2px solid var(--line);border-radius:12px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;margin-bottom:10px;}
  .search:focus{border-color:var(--blue);}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px;}
  .chip{border:none;cursor:pointer;border-radius:18px;padding:6px 14px;font-size:14px;font-family:'Gaegu',sans-serif;font-weight:700;background:#F0EDE7;color:var(--ink);}
  .chip.active{background:var(--blue);color:#fff;}
  .count{text-align:center;color:var(--ink-soft);font-size:13px;margin:4px 0 12px;}
  .list{max-width:760px;margin:0 auto;padding:0 16px;display:flex;flex-direction:column;gap:10px;}
  .entry{background:#fff;border-radius:16px;padding:13px 15px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;}
  .entry:hover{box-shadow:0 3px 12px rgba(0,0,0,.09);}
  .entry .e-name{font-weight:700;font-size:16px;} .entry .e-name .en{font-weight:400;color:var(--ink-soft);font-size:14px;}
  .entry .e-tags{margin:6px 0 4px;display:flex;gap:6px;flex-wrap:wrap;}
  .entry .e-sub{font-size:13px;color:var(--ink-soft);} .entry .e-sub b{color:var(--ink);font-weight:500;}
  .entry .e-date{font-size:11px;color:var(--muted);white-space:nowrap;}
  .empty-state{text-align:center;color:var(--ink-soft);padding:46px 16px;font-family:'Gaegu',sans-serif;font-size:17px;}

  .overlay{position:fixed;inset:0;background:rgba(60,55,50,.4);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .overlay.show{display:flex;}
  #bookingOverlay,#entryOverlay{z-index:60;}
  .sheet{background:#fff;width:100%;max-width:460px;border-radius:22px 22px 0 0;padding:22px 20px 28px;animation:up .22s ease;max-height:88vh;overflow:auto;}
  @keyframes up{from{transform:translateY(40px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
  .sheet h3{font-family:'Gaegu',sans-serif;font-size:22px;margin-bottom:16px;text-align:center;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:14px;color:var(--ink-soft);margin-bottom:5px;}
  .field input,.field select{width:100%;border:2px solid var(--line);border-radius:11px;padding:11px 12px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;outline:none;}
  .field input:focus,.field select:focus{border-color:var(--blue);}
  .row2{display:flex;gap:10px;} .row2 .field{flex:1;}
  .sheet-actions{display:flex;gap:10px;margin-top:6px;}
  .sheet-actions .btn{flex:1;text-align:center;padding:13px;font-size:16px;}
  .hint{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:10px;}

  .wd-row{display:flex;gap:6px;justify-content:space-between;margin-bottom:6px;}
  .wd{flex:1;border:2px solid var(--line);background:#fff;border-radius:10px;padding:9px 0;font-family:'Gaegu',sans-serif;font-weight:700;cursor:pointer;color:var(--ink-soft);}
  .wd.on{background:var(--blue);color:#fff;border-color:var(--blue);}
  .slotedit{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
  .slotedit input{border:2px solid var(--line);border-radius:9px;padding:8px;font-size:14px;font-family:inherit;outline:none;}
  .slotedit input[type=time]{flex:1;min-width:0;}
  .slotedit input.cap{width:56px;text-align:center;}
  .slotedit .rm{border:none;background:#F6E0E6;color:var(--pink-deep);border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:16px;flex:none;}
  .addslot{width:100%;border:2px dashed var(--blue);background:#fff;color:var(--blue-deep);border-radius:10px;padding:9px;font-family:'Gaegu',sans-serif;font-weight:700;cursor:pointer;margin-top:2px;}

  #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;font-family:'Gaegu',sans-serif;font-size:20px;color:var(--ink-soft);gap:8px;text-align:center;padding:20px;}

  @media print{
    header .brand,header .cloud,.tabs,.util,.viewtoggle,.ctrls,.navbtn,.overlay,.others-top{display:none!important;}
    body{padding:0;background:#fff;} .day,.entry{box-shadow:none;border:1px solid #eee;break-inside:avoid;}
  }
  @media (min-width:560px){ .overlay{align-items:center;} .sheet{border-radius:22px;} .day{min-height:74px;} }
</style>
</head>
<body>
  <div id="loading">讀取中… ♪</div>

  <header>
    <div class="brand">✦ 試上 / 課程登記系統 ✦</div>
    <div class="cloud">☁ 雲端共用・所有人看到同一份資料</div>
  </header>

  <nav class="tabs">
    <button class="tab" data-page="home">🏠 首頁</button>
    <button class="tab" data-page="es">ES 試上</button>
    <button class="tab" data-page="others">其他課程</button>
  </nav>

  <div class="util">
    <button id="refreshBtn">🔄 重新整理</button>
    <button id="holidayBtn">🏖 設定放假日</button>
    <button id="lineBtn">🔔 LINE 提醒</button>
    <button id="printBtn">🖨 列印</button>
    <button id="exportCsv">匯出 Excel</button>
  </div>

  <div class="viewtoggle" id="viewtoggle" style="display:none">
    <button data-ov="cal">月曆</button>
    <button data-ov="list">清單</button>
  </div>

  <div class="monthbar" id="monthbar">
    <button class="navbtn" id="prevM">‹</button>
    <h1 id="monthTitle">標題</h1>
    <button class="navbtn" id="nextM">›</button>
  </div>

  <div class="holbanner" id="holbanner">點日期切換放假（淺藍＝放假），完成後再按一次「設定放假日」離開</div>

  <section class="page" id="pageHome">
    <div class="monthbar">
      <button class="navbtn" id="prevW">‹</button>
      <h1 id="weekTitle">本週</h1>
      <button class="navbtn" id="nextW">›</button>
    </div>
    <div class="ctrls"><button class="btn primary" id="copyWeek">📋 複製本週</button></div>
    <div class="home" id="homeContent"></div>
  </section>

  <section class="page" id="pageEs">
    <div class="ctrls"><button class="btn primary" id="settingsBtn">⚙ 設定試上課表</button></div>
    <div class="cal" id="cal"></div>
  </section>

  <section class="page" id="pageOthers">
    <div id="othersCalWrap"><div class="cal" id="othersCal"></div></div>
    <div id="othersListWrap">
      <div class="ctrls"><button class="btn primary" id="addEntry">＋ 新增登記</button></div>
      <div class="others-top">
        <input class="search" id="search" placeholder="搜尋姓名…">
        <div class="chips" id="courseChips"></div>
        <div class="count" id="count"></div>
      </div>
      <div class="list" id="list"></div>
    </div>
  </section>

  <!-- ES day -->
  <div class="overlay" id="dayOverlay"><div class="sheet">
    <h3 id="dayTitle">日期</h3><div id="daySlots"></div>
    <div class="hint">點空格新增、點已填的格子可編輯</div>
  </div></div>

  <!-- ES booking -->
  <div class="overlay" id="bookingOverlay"><div class="sheet">
    <h3 id="bookingTitle">學生試上</h3>
    <div class="field"><label>中文姓名</label><input type="text" id="b-cn" placeholder="王小明"></div>
    <div class="field"><label>英文姓名</label><input type="text" id="b-en" placeholder="Andy"></div>
    <div class="row2">
      <div class="field"><label>年齡</label><input type="text" id="b-age" placeholder="7"></div>
      <div class="field"><label>行政</label><input type="text" id="b-staff" placeholder="Mandy"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn pink" id="bookingDelete">清除</button>
      <button class="btn primary" id="bookingSave">儲存</button>
    </div>
  </div></div>

  <!-- others day -->
  <div class="overlay" id="otherDayOverlay"><div class="sheet">
    <h3 id="otherDayTitle">日期</h3>
    <div id="otherDayList"></div>
    <button class="btn primary" id="otherDayAdd" style="width:100%;margin-top:4px">＋ 新增登記</button>
  </div></div>

  <!-- entry -->
  <div class="overlay" id="entryOverlay"><div class="sheet">
    <h3 id="entryTitle">課程登記</h3>
    <div class="row2">
      <div class="field"><label>日期</label><input type="date" id="e-date"></div>
      <div class="field"><label>預約時間</label><input type="time" id="e-time"></div>
    </div>
    <div class="field"><label>中文姓名</label><input type="text" id="e-cn" placeholder="王小明"></div>
    <div class="field"><label>英文姓名</label><input type="text" id="e-en" placeholder="Andy"></div>
    <div class="row2">
      <div class="field"><label>年齡</label><input type="text" id="e-age" placeholder="7"></div>
      <div class="field"><label>課程</label><select id="e-course"></select></div>
    </div>
    <div class="row2">
      <div class="field"><label>行政</label><input type="text" id="e-staff" placeholder="Mandy"></div>
      <div class="field"><label>來源</label><select id="e-source"></select></div>
    </div>
    <div class="sheet-actions">
      <button class="btn pink" id="entryDelete">刪除</button>
      <button class="btn primary" id="entrySave">儲存</button>
    </div>
  </div></div>

  <!-- ES template settings (per device) -->
  <div class="overlay" id="setOverlay"><div class="sheet">
    <h3>設定試上課表</h3>
    <div class="field"><label>每週上課日</label><div class="wd-row" id="wdRow"></div></div>
    <div class="field"><label>時段（開始 / 結束 / 名額）</label><div id="slotEdit"></div>
      <button class="addslot" id="addSlotBtn">＋ 新增時段</button></div>
    <div class="hint">課表設定存在本機，新增的學生資料則存雲端共用</div>
    <div class="sheet-actions"><button class="btn primary" id="setSave" style="flex:1">儲存</button></div>
  </div></div>

  <!-- LINE reminder settings -->
  <div class="overlay" id="lineOverlay"><div class="sheet">
    <h3>🔔 LINE 群組提醒設定</h3>
    <div class="field"><label>LINE 群組 ID</label><input type="text" id="ln-group" placeholder="Cxxxxxxxxxxxxxxxx"></div>
    <div id="ln-captured" style="display:none;font-size:13px;color:var(--ink-soft);margin:-6px 0 12px">
      偵測到的群組 ID：<b id="ln-cap-val"></b> <button class="btn" id="ln-use" style="padding:4px 10px;font-size:12px">套用</button>
    </div>
    <div class="row2">
      <div class="field"><label>提醒時間</label><input type="time" id="ln-time" value="08:30"></div>
      <div class="field"><label>今日無預約時</label><select id="ln-empty"><option value="0">不發送</option><option value="1">發送「今日無預約」</option></select></div>
    </div>
    <div class="sheet-actions">
      <button class="btn" id="ln-test">立即測試發送</button>
      <button class="btn primary" id="ln-save">儲存</button>
    </div>
    <div class="hint">Channel Access Token 請在 Supabase 的 Edge Function 祕密設定（較安全）；群組 ID 與時間在這裡設定即可。提醒時間以台北時間為準。</div>
  </div></div>

<script>
(function(){
  "use strict";
  const SB_URL='https://srummvdutwgejxrwrfdx.supabase.co';
  const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydW1tdmR1dHdnZWp4cndyZmR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTM0ODAsImV4cCI6MjA5NzA4OTQ4MH0.3YDoVMqPwETZu4eZ8X0usRf_777aTxZITdoZX6n_Do8';
  const sb=window.supabase.createClient(SB_URL,SB_KEY);

  const WD_LABEL=['日','一','二','三','四','五','六'];
  const COURSES=['ES','PH','EP','EL','SC','WP'];
  const SOURCES=['Walk in','Call in','Online','設攤','家長介紹'];
  const TMPL_KEY='es_template_local';

  let page='home', othersView='cal', currentYM=todayYM(), weekOffset=0;
  let bookingCtx=null, dayCtx=null, editingEntryId=null, otherDayCtx=null;
  let courseFilter='全部', searchText='';
  let tmpWeekdays=[], tmpSlots=[];
  let esRows=[], otherRows=[];
  let holidays=new Set(), holidayMode=false, holidaysReady=true;
  let esTemplate=loadTemplate();

  // helpers
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function todayYM(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
  function pad(n){return String(n).padStart(2,'0');}
  function dateStr(y,m,d){return y+'-'+pad(m)+'-'+pad(d);}
  function today(){const d=new Date();return dateStr(d.getFullYear(),d.getMonth()+1,d.getDate());}
  function ymLabel(ym){const[y,m]=ym.split('-');return y+' 年 '+Number(m)+' 月';}
  function courseCls(course){const i=COURSES.indexOf(course);return 'c'+((i<0?0:i)%6);}
  function defaultTemplate(){return{weekdays:[2,4],slots:[{start:'16:00',end:'17:30',cap:2},{start:'16:30',end:'18:00',cap:2}]};}
  function loadTemplate(){try{const r=localStorage.getItem(TMPL_KEY);if(r)return JSON.parse(r);}catch(e){}return defaultTemplate();}
  function saveTemplate(){localStorage.setItem(TMPL_KEY,JSON.stringify(esTemplate));}

  async function sbErr(p,msg){
    try{const{data,error}=await p;if(error){alert((msg||'雲端操作失敗')+'：'+error.message);return null;}return data;}
    catch(e){alert((msg||'連線失敗')+'：'+e.message);return null;}
  }

  // ES data helpers
  function esForDay(date,slot){return esRows.filter(r=>r.date===date&&r.slot===slot)
    .sort((a,b)=>String(a.created_at).localeCompare(String(b.created_at)));}
  function esFilled(date,slot){return esForDay(date,slot).length;}
  function entriesOn(ds){return otherRows.filter(x=>x.date===ds);}

  // ---------- top render ----------
  function render(){
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===page));
    document.getElementById('pageHome').classList.toggle('show',page==='home');
    document.getElementById('pageEs').classList.toggle('show',page==='es');

      document.getElementById('othersListWrap').style.display=othersView==='list'?'':'none';

    else if(page==='es')renderCalendar();

    else renderList();
  }

  // ---------- home (weekly overview) ----------
  function weekRange(offset){
    const d=new Date();d.setHours(0,0,0,0);
    const day=d.getDay(); const diffMon=(day===0?-6:1-day);
    const mon=new Date(d);mon.setDate(d.getDate()+diffMon+offset*7);
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    const f=x=>dateStr(x.getFullYear(),x.getMonth()+1,x.getDate());
    return{start:f(mon),end:f(sun),mon,sun};
  }
  function md(ds){const[,m,d]=ds.split('-').map(Number);return m+'/'+d;}
  function wdOf(ds){const[y,m,d]=ds.split('-').map(Number);return WD_LABEL[new Date(y,m-1,d).getDay()];}
  function buildWeek(offset){
    const wr=weekRange(offset);
    const inRange=ds=>ds>=wr.start&&ds<=wr.end;
    const esByDate={}, otherByDate={};
    esRows.filter(r=>inRange(r.date)).forEach(r=>{
      const t=(esTemplate.slots[r.slot]||{}).start||'';
      (esByDate[r.date]=esByDate[r.date]||[]).push({time:t,name:r.cn||r.en||'?',staff:r.staff||''});
    });
    otherRows.filter(o=>inRange(o.date)).forEach(o=>{
      (otherByDate[o.date]=otherByDate[o.date]||[]).push({time:o.time||'',name:o.cn||o.en||'?',staff:o.staff||'',course:o.course||''});
    });
    Object.values(esByDate).forEach(a=>a.sort((x,y)=>x.time.localeCompare(y.time)));
    Object.values(otherByDate).forEach(a=>a.sort((x,y)=>(x.time||'').localeCompare(y.time||'')));
    return{wr,esByDate,otherByDate};
  }
  function renderHome(){
    const{wr,esByDate,otherByDate}=buildWeek(weekOffset);
    const label=weekOffset===0?'本週':(weekOffset===-1?'上週':(weekOffset===1?'下週':(weekOffset<0?Math.abs(weekOffset)+' 週前':weekOffset+' 週後')));
    document.getElementById('weekTitle').textContent=label+'　'+md(wr.start)+'–'+md(wr.end);
    const sec=(byDate)=>{
      const dates=Object.keys(byDate).sort();
      if(!dates.length)return '<div class="none">這週沒有資料</div>';
      return dates.map(ds=>'<div class="dh">'+md(ds)+'（'+wdOf(ds)+'）</div>'+
        byDate[ds].map(x=>'<div class="ln">'+(x.time?'<b>'+esc(x.time)+'</b>-':'')+esc(x.name)+(x.course?'-'+esc(x.course):'')+(x.staff?'-'+esc(x.staff):'')+'</div>').join('')
      ).join('');
    };
    document.getElementById('homeContent').innerHTML=
      '<h2><span class="dot" style="background:var(--pink-deep)"></span>本週試上</h2>'+sec(esByDate)+
      '<h2><span class="dot" style="background:var(--mint-deep)"></span>本週課程介紹</h2>'+sec(otherByDate);
  }
  function weekText(){
    const{wr,esByDate,otherByDate}=buildWeek(weekOffset);
    const sec=(byDate)=>{
      const dates=Object.keys(byDate).sort();
      if(!dates.length)return '（無）';
      return dates.map(ds=>md(ds)+'（'+wdOf(ds)+'）\n'+
        byDate[ds].map(x=>(x.time?x.time+'-':'')+x.name+(x.course?'-'+x.course:'')+(x.staff?'-'+x.staff:'')).join('\n')
      ).join('\n');
    };
    return '📅 '+md(wr.start)+'–'+md(wr.end)+' 課程總覽\n\n【本週試上】\n'+sec(esByDate)+'\n\n【本週課程介紹】\n'+sec(otherByDate);
  }
  document.getElementById('prevW').onclick=()=>{weekOffset--;renderHome();};
  document.getElementById('nextW').onclick=()=>{weekOffset++;renderHome();};
  document.getElementById('copyWeek').onclick=async function(){
    const txt=weekText();
    try{await navigator.clipboard.writeText(txt);alert('已複製本週總覽，可直接貼到 LINE ✓');}
    catch(e){
      const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
      try{document.execCommand('copy');alert('已複製本週總覽，可直接貼到 LINE ✓');}catch(_e){alert('複製失敗，請手動選取');}
      document.body.removeChild(ta);
    }
  };

  // ---------- ES calendar ----------
  function renderCalendar(){
    const tmpl=esTemplate, cal=document.getElementById('cal');
    let head=(!tmpl.weekdays.length||!tmpl.slots.length)?'<div class="notice">還沒設定課表，點「⚙ 設定試上課表」安排上課日與時段 ♪</div>':'';
    const[y,m]=currentYM.split('-').map(Number);
    const first=new Date(y,m-1,1).getDay(), days=new Date(y,m,0).getDate(), todayS=today();
    let cells=WD_LABEL.map(w=>'<div class="dow">'+w+'</div>').join('');
    for(let i=0;i<first;i++)cells+='<div class="day blank"></div>';
    for(let d=1;d<=days;d++){
      const ds=dateStr(y,m,d), wd=new Date(y,m-1,d).getDay(), isHol=holidays.has(ds);
      const active=tmpl.weekdays.includes(wd)&&tmpl.slots.length&&!isHol;
      let badges='';
      if(isHol)badges='<span class="hol-label">放假</span>';
      else if(active){
        tmpl.slots.forEach((sl,i)=>{const rows=esForDay(ds,i);
          for(let j=0;j<sl.cap;j++){const bk=rows[j];
            if(bk){const parts=[bk.cn||bk.en||'?'];if(bk.staff)parts.push(bk.staff);parts.push(sl.start);
              badges+='<span class="badge c'+(i%3)+'">'+esc(parts.join('-'))+'</span>';}
            else badges+='<span class="badge slotempty">'+esc(sl.start)+'</span>';
          }});
      }
      const clickable=holidayMode||active;
      const attr=holidayMode?(' data-hol="'+ds+'"'):(active?(' data-day="'+ds+'"'):'');
      cells+='<div class="day'+(clickable?' has':'')+(isHol?' holiday':'')+(ds===todayS?' today':'')+'"'+attr+'><span class="dnum">'+d+'</span>'+badges+'</div>';
    }
    cal.innerHTML=head+'<div class="cal-grid">'+cells+'</div>';
    cal.querySelectorAll('[data-day]').forEach(c=>c.onclick=()=>openDay(c.dataset.day));
    cal.querySelectorAll('[data-hol]').forEach(c=>c.onclick=()=>toggleHoliday(c.dataset.hol));
  }

  const dayOv=document.getElementById('dayOverlay'), bOv=document.getElementById('bookingOverlay');
  function openDay(ds){dayCtx=ds;renderDay();dayOv.classList.add('show');}
  function renderDay(){
    const ds=dayCtx, tmpl=esTemplate;
    const[y,m,d]=ds.split('-').map(Number), wd=new Date(y,m-1,d).getDay();
    document.getElementById('dayTitle').textContent=m+'/'+d+'（'+WD_LABEL[wd]+'）　ES 試上';
    let html='';
    tmpl.slots.forEach((sl,si)=>{
      html+='<div class="slot-h">'+esc(sl.start)+'–'+esc(sl.end)+' <span style="color:var(--ink-soft);font-weight:400;font-size:14px">名額 '+sl.cap+'</span></div>';
      const rows=esForDay(ds,si);
      rows.forEach(bk=>{
        html+='<div class="slot" data-id="'+bk.id+'" data-si="'+si+'"><div class="nm">'+esc(bk.cn||'(未填中文)')+(bk.en?' <span class="en">'+esc(bk.en)+'</span>':'')+'</div><div class="meta">'+(bk.age?'<b>'+esc(bk.age)+'</b> 歲　':'')+(bk.staff?'行政：<b>'+esc(bk.staff)+'</b>':'')+'</div></div>';
      });
      for(let j=rows.length;j<sl.cap;j++){
        html+='<div class="slot empty" data-new data-si="'+si+'">＋ 點擊新增</div>';
      }
    });
    document.getElementById('daySlots').innerHTML=html;
    document.querySelectorAll('#daySlots [data-id]').forEach(b=>b.onclick=()=>openBooking(ds,Number(b.dataset.si),b.dataset.id));
    document.querySelectorAll('#daySlots [data-new]').forEach(b=>b.onclick=()=>openBooking(ds,Number(b.dataset.si),null));
  }
  function openBooking(ds,si,id){
    bookingCtx={date:ds,slot:si,id:id||null};
    const bk=id?esRows.find(r=>r.id===id):null;
    const sl=esTemplate.slots[si];const[,m,d]=ds.split('-').map(Number);
    document.getElementById('bookingTitle').textContent=m+'/'+d+'　'+sl.start+'–'+sl.end;
    document.getElementById('b-cn').value=bk?bk.cn||'':'';
    document.getElementById('b-en').value=bk?bk.en||'':'';
    document.getElementById('b-age').value=bk?bk.age||'':'';
    document.getElementById('b-staff').value=bk?bk.staff||'':'';
    document.getElementById('bookingDelete').style.display=id?'':'none';
    bOv.classList.add('show');
  }
  document.getElementById('bookingSave').onclick=async function(){
    const btn=this;btn.disabled=true;
    const cn=document.getElementById('b-cn').value.trim(),en=document.getElementById('b-en').value.trim();
    if(!cn&&!en){alert('請至少填中文或英文姓名');btn.disabled=false;return;}
    const payload={date:bookingCtx.date,slot:bookingCtx.slot,cn,en,age:document.getElementById('b-age').value.trim(),staff:document.getElementById('b-staff').value.trim()};
    if(bookingCtx.id){
      const data=await sbErr(sb.from('es_bookings').update(payload).eq('id',bookingCtx.id).select(),'更新失敗');
      if(data){const i=esRows.findIndex(r=>r.id===bookingCtx.id);if(i>=0)esRows[i]=data[0];}
    }else{
      const data=await sbErr(sb.from('es_bookings').insert(payload).select(),'新增失敗');
      if(data)esRows.push(data[0]);
    }
    btn.disabled=false;bOv.classList.remove('show');renderDay();renderCalendar();
  };
  document.getElementById('bookingDelete').onclick=async function(){
    if(!bookingCtx.id)return;
    const ok=await sbErr(sb.from('es_bookings').delete().eq('id',bookingCtx.id),'刪除失敗');
    if(ok!==null)esRows=esRows.filter(r=>r.id!==bookingCtx.id);
    bOv.classList.remove('show');renderDay();renderCalendar();
  };

  const setOv=document.getElementById('setOverlay');
  document.getElementById('settingsBtn').onclick=function(){
    tmpWeekdays=esTemplate.weekdays.slice();tmpSlots=esTemplate.slots.map(s=>({start:s.start,end:s.end,cap:s.cap}));
    renderWd();renderSlotEdit();setOv.classList.add('show');
  };
  function renderWd(){
    const row=document.getElementById('wdRow');
    row.innerHTML=WD_LABEL.map((w,i)=>'<button class="wd'+(tmpWeekdays.includes(i)?' on':'')+'" data-wd="'+i+'">'+w+'</button>').join('');

  function renderSlotEdit(){
    const box=document.getElementById('slotEdit');
    box.innerHTML=tmpSlots.map((s,i)=>'<div class="slotedit"><input type="time" value="'+esc(s.start)+'" data-k="start" data-i="'+i+'"><input type="time" value="'+esc(s.end)+'" data-k="end" data-i="'+i+'"><input type="number" class="cap" min="1" max="12" value="'+s.cap+'" data-k="cap" data-i="'+i+'"><button class="rm" data-rm="'+i+'">×</button></div>').join('');
    box.querySelectorAll('input').forEach(inp=>inp.oninput=()=>{const i=Number(inp.dataset.i),k=inp.dataset.k;tmpSlots[i][k]=k==='cap'?Math.max(1,Math.min(12,Number(inp.value)||1)):inp.value;});
    box.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{tmpSlots.splice(Number(b.dataset.rm),1);renderSlotEdit();});
  }
  document.getElementById('addSlotBtn').onclick=()=>{tmpSlots.push({start:'16:00',end:'17:30',cap:2});renderSlotEdit();};
  document.getElementById('setSave').onclick=function(){
    esTemplate={weekdays:tmpWeekdays.slice().sort((a,b)=>a-b),slots:tmpSlots.map(s=>({start:s.start,end:s.end,cap:s.cap}))};
    saveTemplate();setOv.classList.remove('show');renderCalendar();
  };

  // ---------- others calendar ----------
  function renderOthersCal(){
    const cal=document.getElementById('othersCal');
    const[y,m]=currentYM.split('-').map(Number);
    const first=new Date(y,m-1,1).getDay(), days=new Date(y,m,0).getDate(), todayS=today();
    let cells=WD_LABEL.map(w=>'<div class="dow">'+w+'</div>').join('');
    for(let i=0;i<first;i++)cells+='<div class="day blank"></div>';
    for(let d=1;d<=days;d++){
      const ds=dateStr(y,m,d), isHol=holidays.has(ds), items=entriesOn(ds);
      let badges='';
      if(isHol)badges='<span class="hol-label">放假</span>';
      else{
        items.slice(0,3).forEach(x=>{const parts=[x.cn||x.en||'?'];if(x.staff)parts.push(x.staff);if(x.time)parts.push(x.time);badges+='<span class="badge '+courseCls(x.course)+'">'+esc(parts.join('-'))+'</span>';});
        if(items.length>3)badges+='<span class="badge more">+'+(items.length-3)+'</span>';
      }
      const clickable=holidayMode||!isHol;
      const attr=holidayMode?(' data-hol="'+ds+'"'):(!isHol?(' data-od="'+ds+'"'):'');
      cells+='<div class="day'+(clickable?' has':'')+(isHol?' holiday':'')+(ds===todayS?' today':'')+'"'+attr+'><span class="dnum">'+d+'</span>'+badges+'</div>';
    }
    cal.innerHTML='<div class="cal-grid">'+cells+'</div>';
    cal.querySelectorAll('[data-od]').forEach(c=>c.onclick=()=>openOtherDay(c.dataset.od));
    cal.querySelectorAll('[data-hol]').forEach(c=>c.onclick=()=>toggleHoliday(c.dataset.hol));

    if(page==='es')renderCalendar();else renderOthersCal();
    document.getElementById('monthTitle').textContent=ymLabel(currentYM)+'　'+(page==='es'?'ES 試上':'其他課程');}
  document.getElementById('prevM').onclick=()=>shiftMonth(-1);
  document.getElementById('nextM').onclick=()=>shiftMonth(1);

  // ---------- LINE reminder settings ----------
  const FUNC_URL='https://srummvdutwgejxrwrfdx.supabase.co/functions/v1/daily-line-reminder';
  const lnOv=document.getElementById('lineOverlay');
  document.getElementById('lineBtn').onclick=async function(){
    const{data,error}=await sb.from('line_settings').select('*').eq('id',1).single();
    if(error){alert('LINE 提醒功能需要先在 Supabase 建一張設定表（請見說明的 SQL）');return;}
    document.getElementById('ln-group').value=data.group_id||'';
    document.getElementById('ln-time').value=data.send_time||'08:30';
    document.getElementById('ln-empty').value=data.send_when_empty?'1':'0';
    const cap=document.getElementById('ln-captured');
    if(data.captured_group_id){cap.style.display='block';document.getElementById('ln-cap-val').textContent=data.captured_group_id;}
    else cap.style.display='none';
    lnOv.classList.add('show');
  };
  document.getElementById('ln-use').onclick=function(){document.getElementById('ln-group').value=document.getElementById('ln-cap-val').textContent;};
  async function saveLine(){
    const payload={group_id:document.getElementById('ln-group').value.trim(),send_time:document.getElementById('ln-time').value||'08:30',send_when_empty:document.getElementById('ln-empty').value==='1'};
    const{error}=await sb.from('line_settings').update(payload).eq('id',1);
    return error;
  }
  document.getElementById('ln-save').onclick=async function(){
    const err=await saveLine();
    if(err){alert('儲存失敗：'+err.message);return;}
    lnOv.classList.remove('show');alert('已儲存 ✓');
  };
  document.getElementById('ln-test').onclick=async function(){
    this.disabled=true;
    const err=await saveLine();
    if(err){alert('儲存失敗：'+err.message);this.disabled=false;return;}
    try{const r=await fetch(FUNC_URL+'?force=1',{headers:{'Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY}});
      alert('測試結果：'+(await r.text()));}
    catch(e){alert('測試失敗（可能函式還沒建好）：'+e.message);}
    this.disabled=false;
  };

  [dayOv,bOv,eOv,setOv,odOv,lnOv].forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('show');}));
  document.getElementById('printBtn').onclick=()=>window.print();
  document.getElementById('refreshBtn').onclick=()=>fetchAll(true);

  // ---------- holidays ----------
  async function toggleHoliday(ds){
    if(!holidaysReady){alert('放假日功能需要先在 Supabase 建一張資料表（請見說明的 SQL）');return;}
    if(holidays.has(ds)){
      const{error}=await sb.from('holidays').delete().eq('date',ds);
      if(error){alert('移除放假失敗：'+error.message);return;}
      holidays.delete(ds);
    }else{
      const{error}=await sb.from('holidays').insert({date:ds});
      if(error&&!String(error.message).toLowerCase().includes('duplicate')){alert('設定放假失敗：'+error.message);return;}
      holidays.add(ds);
    }
    if(page==='es')renderCalendar();else renderOthersCal();
  }
  document.getElementById('holidayBtn').onclick=function(){
    if(!holidaysReady){alert('放假日功能需要先在 Supabase 建一張資料表（請見說明的 SQL）');return;}
    holidayMode=!holidayMode;
    document.body.classList.toggle('holmode',holidayMode);
    this.classList.toggle('on',holidayMode);
    this.textContent=holidayMode?'✓ 完成放假設定':'🏖 設定放假日';
    if(holidayMode&&page==='others'&&othersView==='list')othersView='cal';
    render();
  };

  // export csv
  document.getElementById('exportCsv').onclick=function(){
    const rows=[['類型','日期','星期','時段','中文姓名','英文姓名','年齡','課程','行政','來源']];
    esRows.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')||a.slot-b.slot).forEach(bk=>{
      const wd=bk.date?WD_LABEL[new Date(bk.date.split('-')[0],bk.date.split('-')[1]-1,bk.date.split('-')[2]).getDay()]:'';
      const sl=esTemplate.slots[bk.slot];
      rows.push(['ES試上',bk.date||'',wd,sl?sl.start+'-'+sl.end:'',bk.cn,bk.en,bk.age,'ES',bk.staff,'']);
    });
    otherRows.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(x=>{
      const wd=x.date?WD_LABEL[new Date(x.date.split('-')[0],x.date.split('-')[1]-1,x.date.split('-')[2]).getDay()]:'';
      rows.push(['其他課程',x.date||'',wd,x.time||'',x.cn,x.en,x.age,x.course,x.staff,x.source]);
    });
    const csv=rows.map(r=>r.map(c=>'"'+String(c==null?'':c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='登記名單-'+todayYM()+'.csv';a.click();URL.revokeObjectURL(a.href);
  };

  // ---------- init / fetch ----------
  async function fetchAll(silent){
    const ld=document.getElementById('loading');
    if(!silent){ld.style.display='flex';ld.textContent='讀取中… ♪';}
    const e1=await sb.from('es_bookings').select('*');
    const e2=await sb.from('other_entries').select('*');
    if(e1.error||e2.error){
      const msg=(e1.error||e2.error).message;
      ld.style.display='flex';
      ld.innerHTML='讀取資料時出問題 😢<br><span style="font-size:14px">'+esc(msg)+'</span><br><span style="font-size:13px">請確認資料表與政策已建立，再重整頁面</span>';
      return;
    }
    esRows=e1.data||[];otherRows=e2.data||[];
    const e3=await sb.from('holidays').select('date');
    if(e3.error){holidaysReady=false;holidays=new Set();}
    else{holidaysReady=true;holidays=new Set((e3.data||[]).map(r=>r.date));}
    ld.style.display='none';
    render();
  }
  fetchAll(false);
})();
</script>
</body>
</html>
